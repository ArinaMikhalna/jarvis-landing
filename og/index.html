<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>OG cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;box-sizing:border-box}
  :root{--bg:#04070e;--accent:#00A3FF;--glow:#86d6ff;--dim:rgba(225,234,247,.66);--faint:rgba(225,234,247,.4)}
  html,body{width:1200px;height:630px;overflow:hidden}
  .cover{position:relative;width:1200px;height:630px;background:
      radial-gradient(70% 90% at 78% 12%, color-mix(in srgb,var(--accent) 30%,transparent), transparent 60%),
      radial-gradient(60% 80% at 0% 100%, color-mix(in srgb,#EE140F 18%,transparent), transparent 55%),
      var(--bg);
    color:#fff;font-family:"Inter Tight",system-ui,sans-serif;overflow:hidden}
  /* угловые скобки HUD */
  .br{position:absolute;width:34px;height:34px;border:2px solid var(--accent);opacity:.7}
  .br.tl{top:34px;left:34px;border-right:0;border-bottom:0}
  .br.tr{top:34px;right:34px;border-left:0;border-bottom:0}
  .br.bl{bottom:34px;left:34px;border-right:0;border-top:0}
  .br.brr{bottom:34px;right:34px;border-left:0;border-top:0}
  .hud{position:absolute;top:46px;left:80px;font-family:"JetBrains Mono",monospace;font-size:15px;letter-spacing:.32em;color:var(--accent)}
  .hud b{color:var(--faint);font-weight:400}
  .wrap{position:absolute;left:80px;top:150px;right:80px}
  .chip{display:inline-flex;align-items:center;gap:10px;font-family:"JetBrains Mono",monospace;font-size:15px;
    letter-spacing:.08em;color:var(--dim);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
    border-radius:999px;padding:9px 18px;margin-bottom:26px;background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle,var(--glow),var(--accent));box-shadow:0 0 10px var(--accent)}
  h1{font-family:"Unbounded",sans-serif;font-weight:900;font-size:82px;line-height:.98;letter-spacing:-.02em;max-width:980px}
  .hl{display:inline-block;background:var(--accent);color:#02040a;padding:0 .12em;border-radius:.16em;transform:rotate(-1.5deg);box-shadow:0 0 40px -6px var(--accent)}
  p{margin-top:26px;font-size:27px;color:var(--dim);max-width:760px}
  .foot{position:absolute;left:80px;bottom:54px;font-family:"JetBrains Mono",monospace;font-size:16px;letter-spacing:.14em;color:var(--faint)}
  .foot b{color:#fff}
</style>
</head>
<body>
  <div class="cover">
    <span class="br tl"></span><span class="br tr"></span><span class="br bl"></span><span class="br brr"></span>
    <div class="hud">STARK · INDUSTRIES <b>// ДЖАРВИС v1.0</b></div>
    <div class="wrap">
      <span class="chip"><span class="dot"></span> Курс по экосистеме Claude</span>
      <h1>Твой личный <span class="hl">ДЖАРВИС</span><br>за вечер</h1>
      <p>Собери систему, которая пишет, считает и автоматизирует за тебя.</p>
    </div>
    <div class="foot">А.М. РЕШАЕТ ВОПРОСЫ &nbsp;·&nbsp; <b>Доступ сразу · Возврат 7 дней</b></div>
  </div>
</body>
</html>
