<!doctype html>
<html lang="ru"><head><meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=JetBrains+Mono:wght@400;700&family=Inter+Tight:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:#04070e;color:#fff;font-family:"Inter Tight",sans-serif;position:relative;
    background-image:
      radial-gradient(55% 70% at 82% 30%, rgba(0,163,255,.22), transparent 60%),
      radial-gradient(50% 60% at 8% 95%, rgba(238,20,15,.10), transparent 60%);}
  .frame{position:absolute;inset:34px;border:1px solid rgba(120,160,210,.18);border-radius:18px}
  .wrap{position:absolute;inset:0;padding:74px 80px;display:flex;flex-direction:column;justify-content:space-between}
  .brand{font-family:"JetBrains Mono",monospace;font-weight:700;letter-spacing:.14em;font-size:21px}
  .brand span{color:#7d93b3;font-weight:400;font-size:17px;margin-left:8px}
  .mid{margin-top:auto}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:16px;letter-spacing:.2em;color:#00A3FF;text-transform:uppercase;margin-bottom:20px}
  h1{font-family:"Unbounded",sans-serif;font-weight:900;font-size:74px;line-height:1.02;letter-spacing:-.02em}
  h1 .accent{color:#00A3FF}
  .sub{font-size:25px;color:#c4d4e8;margin-top:24px;max-width:780px;line-height:1.45}
  .foot{display:flex;align-items:center;gap:22px;margin-top:6px}
  .pill{font-family:"JetBrains Mono",monospace;font-size:18px;letter-spacing:.05em;color:#04070e;background:#00A3FF;
    padding:13px 22px;border-radius:999px;font-weight:700}
  .meta{font-family:"JetBrains Mono",monospace;font-size:17px;color:#8aa0c0;letter-spacing:.04em}
  .reactor{position:absolute;right:80px;bottom:74px;width:120px;height:120px}
</style></head>
<body>
  <div class="frame"></div>
  <div class="wrap">
    <div class="brand">J.A.R.V.I.S.<span>/ Claude за вечер</span></div>
    <div class="mid">
      <div class="eyebrow">Курс по экосистеме Claude</div>
      <h1>Твой личный <span class="accent">ДЖАРВИС</span><br>за один вечер</h1>
      <div class="sub">Claude пишет, считает и автоматизирует за тебя. А ты ускоряешься в 10 раз.</div>
    </div>
    <div class="foot">
      <div class="pill">от 990 ₽</div>
      <div class="meta">8 видео-уроков · доступ сразу · возврат 7 дней</div>
    </div>
  </div>
  <svg class="reactor" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="46" fill="none" stroke="#00A3FF" stroke-width="3" opacity=".4"/>
    <circle cx="60" cy="60" r="30" fill="none" stroke="#86d6ff" stroke-width="4"/>
    <circle cx="60" cy="60" r="11" fill="#cdeeff"/>
  </svg>
</body></html>
